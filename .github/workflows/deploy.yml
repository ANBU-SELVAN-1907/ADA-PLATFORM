name: Build, Provision & Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_FRONTEND: ada/frontend
  ECR_REPOSITORY_BACKEND: ada/backend
  ECS_SERVICE: deloitte-ai-insights-service
  ECS_CLUSTER: deloitte-ai-insights-cluster

jobs:
  deploy:
    name: Build, Provision & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Get AWS Account ID
      id: get-account
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
        echo "ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

    - name: Ensure ECR Repositories Exist
      run: |
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY_BACKEND }} 2>/dev/null || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY_BACKEND }}
        aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY_FRONTEND }} 2>/dev/null || aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY_FRONTEND }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Backend Image to Amazon ECR
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest ./backend
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest

    - name: Build, Tag, and Push Frontend Image to Amazon ECR
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest ./frontend
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Ensure S3 Bucket for Terraform State Exists
      run: |
        BUCKET_NAME="ada-tf-state-${{ steps.get-account.outputs.account_id }}"
        # Check if bucket exists, if not create it
        if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
          echo "S3 state bucket $BUCKET_NAME already exists."
        else
          echo "Creating S3 state bucket $BUCKET_NAME..."
          aws s3api create-bucket --bucket "$BUCKET_NAME" --region ${{ env.AWS_REGION }}
        fi

    - name: Terraform Init
      run: |
        BUCKET_NAME="ada-tf-state-${{ steps.get-account.outputs.account_id }}"
        cd terraform
        terraform init \
          -backend-config="bucket=$BUCKET_NAME" \
          -backend-config="key=state/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}"

    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve \
          -var="ecr_repo_url=${{ env.ECR_REGISTRY }}"

    - name: Force ECS Deployment Refresh
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment --region ${{ env.AWS_REGION }}
