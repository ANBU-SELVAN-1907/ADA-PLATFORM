version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # FRONTEND_URL defines allowed CORS origins. Nginx is exposing on 8080.
      - FRONTEND_URL=http://localhost:8080
      - ADA_OMNIROUTE_API_KEY=${ADA_OMNIROUTE_API_KEY:-}
      - ADA_OMNIROUTE_BASE_URL=${ADA_OMNIROUTE_BASE_URL:-}
      - ADA_GITHUB_TOKEN=${ADA_GITHUB_TOKEN:-}
      - ADA_MAX_CONCURRENT_AGENTS=${ADA_MAX_CONCURRENT_AGENTS:-6}
      - ADA_AGENT_TIMEOUT_SEC=${ADA_AGENT_TIMEOUT_SEC:-120}
      - ADA_LLM_TEMPERATURE=${ADA_LLM_TEMPERATURE:-0.2}
      - ADA_LLM_MAX_TOKENS=${ADA_LLM_MAX_TOKENS:-8000}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./output:/app/output
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
